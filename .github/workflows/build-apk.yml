name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [main, master]
    paths-ignore:
      - 'docs/**'
      - '**.md'

jobs:
  build-android:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.14.0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK
        run: |
          ${ANDROID_SDK_ROOT}/cmdline-tools/latest/bin/sdkmanager --sdk_root=${ANDROID_SDK_ROOT} "ndk;28.2.13676358"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Copy vendor files
        run: pnpm --filter @openreadest/app setup-vendors

      - name: Init and build Android
        working-directory: apps/openreadest-app
        run: |
          export NDK_HOME="$ANDROID_HOME/ndk/28.2.13676358"
          rm -rf src-tauri/gen/android
          pnpm tauri android init
          pnpm tauri android build --apk true

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk-universal
          path: apps/openreadest-app/src-tauri/gen/android/app/build/outputs/apk/universal/release/app-universal-release.apk
          retention-days: 30
